<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тест | Сленг 21 века</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🗣️</span>
                <span class="logo-text">Сленг 21 века</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="dictionary.html">Словарь</a></li>
                <li><a href="quiz.html" class="active">Тест</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>Угадай слово</h1>
            <p>Проверь, насколько хорошо ты ориентируешься в современном сленге. 20 вопросов ждут тебя!</p>
        </section>

        <section class="quiz-container">
            <div class="quiz-card" id="quizCard">
                <div class="quiz-progress">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">20</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div class="quiz-content">
                    <h3 id="questionText">Загрузка...</h3>
                    <div class="quiz-options" id="quizOptions"></div>
                </div>
                <div class="quiz-result" id="quizResult" style="display: none;">
                    <div class="result-icon" id="resultIcon">🎉</div>
                    <h3 id="resultTitle">Ваш результат</h3>
                    <div class="result-score" id="resultScore">0/20</div>
                    <p id="resultMessage"></p>
                    <button class="btn btn-primary" id="restartQuiz">Пройти заново</button>
                </div>
                <div class="quiz-controls" id="quizControls">
                    <button class="btn btn-secondary" id="prevBtn" disabled>← Назад</button>
                    <button class="btn btn-primary" id="nextBtn">Далее →</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>Проектная работа ученика 7 класса Московской школы</p>
            <p>Сленг 21 века: от учителя до ученика © 2026</p>
        </div>
    </footer>

    <script>
        const quizQuestions = [
            { text: "Что означает слово «Кринж»?", options: ["Красивый человек", "Что-то очень неловкое и стыдное", "Смешная шутка", "Быстрый бег"], correct: 1 },
            { text: "Какое слово означает «атмосфера, настроение»?", options: ["Хайп", "Флексить", "Вайб", "Рофл"], correct: 2 },
            { text: "Что такое «деадлайн»?", options: ["Выходной день", "Крайний срок выполнения задачи", "Новый проект", "Онлайн-встреча"], correct: 1 },
            { text: "«Хард скиллы» — это...", options: ["Личные качества", "Профессиональные навыки", "Спортивные достижения", "Музыкальные способности"], correct: 1 },
            { text: "Что значит «рофл»?", options: ["Серьезный разговор", "Шутка, над которой можно посмеяться", "Спортивное соревнование", "Учебное задание"], correct: 1 },
            { text: "«Прокрастинация» — это...", options: ["Быстрая работа", "Привычка откладывать дела на потом", "Отличная память", "Умение общаться"], correct: 1 },
            { text: "Кого называют «крашем»?", options: ["Учителя", "Друга", "Человека, который очень нравится", "Родителя"], correct: 2 },
            { text: "Что такое «тимбилдинг»?", options: ["Строительство дома", "Мероприятия для сплочения команды", "Ремонт техники", "Школьное собрание"], correct: 1 },
            { text: "«Чекать» — это...", options: ["Проверять, смотреть", "Покупать", "Рисовать", "Петь"], correct: 0 },
            { text: "Что означает «софт скиллы»?", options: ["Программирование", "Личностные качества и коммуникативные навыки", "Математические способности", "Спортивные достижения"], correct: 1 },
            { text: "Что значит «хайп»?", options: ["Тишина", "Ажиотаж, шумиха", "Грусть", "Учеба"], correct: 1 },
            { text: "«Флексить» — это...", options: ["Хвастаться, расслабляться", "Бегать быстро", "Плакать", "Учиться"], correct: 0 },
            { text: "Что такое «имба»?", options: ["Что-то слабое", "Что-то очень крутое", "Новый телефон", "Старая игра"], correct: 1 },
            { text: "«Агриться» означает...", options: ["Радоваться", "Злиться, проявлять агрессию", "Спать", "Учиться"], correct: 1 },
            { text: "Что такое «фидбек»?", options: ["Обратная связь", "Новый фильм", "Компьютерная игра", "Школьный предмет"], correct: 0 },
            { text: "«Брейншторм» — это...", options: ["Гроза", "Мозговой штурм, генерация идей", "Спортивное соревнование", "Музыкальный фестиваль"], correct: 1 },
            { text: "Что значит «кейс» в профессиональном сленге?", options: ["Чемодан", "Реальная ситуация из практики", "Новый дом", "Компьютер"], correct: 1 },
            { text: "«Нетворкинг» — это...", options: ["Рыбалка", "Построение полезных связей", "Компьютерная сеть", "Спорт"], correct: 1 },
            { text: "Что такое «база» в молодежном сленге?", options: ["Основание здания", "Что-то очевидное, истина", "Баскетбольная площадка", "База данных"], correct: 1 },
            { text: "«Чилить» означает...", options: ["Работать", "Отдыхать, расслабляться", "Учиться", "Бежать"], correct: 1 }
        ];

        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizQuestions.length).fill(null);
        let quizCompleted = false;

        const questionText = document.getElementById('questionText');
        const quizOptions = document.getElementById('quizOptions');
        const currentQuestionSpan = document.getElementById('currentQuestion');
        const totalQuestionsSpan = document.getElementById('totalQuestions');
        const progressFill = document.getElementById('progressFill');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const quizControls = document.getElementById('quizControls');
        const quizResultDiv = document.getElementById('quizResult');
        const quizContent = document.querySelector('.quiz-content');

        totalQuestionsSpan.textContent = quizQuestions.length;

        function renderQuestion() {
            const question = quizQuestions[currentQuestionIndex];
            questionText.textContent = question.text;
            
            quizOptions.innerHTML = '';
            question.options.forEach((option, index) => {
                const isChecked = userAnswers[currentQuestionIndex] === index;
                const optionDiv = document.createElement('div');
                optionDiv.className = `quiz-option ${isChecked ? 'selected' : ''}`;
                optionDiv.innerHTML = `
                    <input type="radio" name="quiz" value="${index}" id="opt${index}" ${isChecked ? 'checked' : ''}>
                    <label for="opt${index}">${option}</label>
                `;
                optionDiv.addEventListener('click', () => {
                    const radio = optionDiv.querySelector('input');
                    radio.checked = true;
                    userAnswers[currentQuestionIndex] = index;
                    document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected'));
                    optionDiv.classList.add('selected');
                    updateNextButtonState();
                });
                quizOptions.appendChild(optionDiv);
            });
            
            currentQuestionSpan.textContent = currentQuestionIndex + 1;
            const progress = ((currentQuestionIndex + 1) / quizQuestions.length) * 100;
            progressFill.style.width = `${progress}%`;
            
            prevBtn.disabled = currentQuestionIndex === 0;
            updateNextButtonState();
        }

        function updateNextButtonState() {
            if (userAnswers[currentQuestionIndex] !== null) {
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }
        }

        function calculateResult() {
            let correctCount = 0;
            userAnswers.forEach((answer, index) => {
                if (answer === quizQuestions[index].correct) {
                    correctCount++;
                }
            });
            return correctCount;
        }

        function showResult() {
            const correctCount = calculateResult();
            const percentage = (correctCount / quizQuestions.length) * 100;
            
            quizContent.style.display = 'none';
            quizControls.style.display = 'none';
            quizResultDiv.style.display = 'block';
            
            const resultScore = document.getElementById('resultScore');
            resultScore.textContent = `${correctCount}/${quizQuestions.length}`;
            
            const resultMessage = document.getElementById('resultMessage');
            const resultIcon = document.getElementById('resultIcon');
            
            if (percentage === 100) {
                resultMessage.textContent = 'Идеально! Ты настоящий знаток сленга! 👑';
                resultIcon.textContent = '🏆';
            } else if (percentage >= 80) {
                resultMessage.textContent = 'Отлично! Ты хорошо ориентируешься в современном языке! 🌟';
                resultIcon.textContent = '🎉';
            } else if (percentage >= 60) {
                resultMessage.textContent = 'Неплохо! Загляни в словарь, чтобы узнать новые слова! 📚';
                resultIcon.textContent = '👍';
            } else if (percentage >= 40) {
                resultMessage.textContent = 'Средний результат. Посмотри словарь и попробуй снова! 💪';
                resultIcon.textContent = '📖';
            } else {
                resultMessage.textContent = 'Стоит подтянуть знания! Открой словарь и выучи новые слова! 📚✨';
                resultIcon.textContent = '💡';
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                quizCompleted = true;
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = new Array(quizQuestions.length).fill(null);
            quizCompleted = false;
            quizContent.style.display = 'block';
            quizControls.style.display = 'flex';
            quizResultDiv.style.display = 'none';
            renderQuestion();
        }

        nextBtn.addEventListener('click', nextQuestion);
        prevBtn.addEventListener('click', prevQuestion);
        document.getElementById('restartQuiz').addEventListener('click', restartQuiz);

        renderQuestion();

        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
    </script>
</body>
</html>
